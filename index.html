    <script>
        // 这是您专属的 API 密钥
        const apiKey = "AIzaSyClLZCyhqctBscily6uyvQsPDJf81GMGNs"; 

        // 具有指数退避重试的 fetch 函数
        async function fetchWithRetry(url, options, maxRetries = 5) {
            let retries = 0;
            const delays = [1000, 2000, 4000, 8000, 16000]; // 指数退避延迟

            while (retries < maxRetries) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`HTTP error! status: ${response.status}, message: ${errText}`);
                    }
                    return await response.json();
                } catch (error) {
                    retries++;
                    if (retries >= maxRetries) {
                        throw error;
                    }
                    await new Promise(resolve => setTimeout(resolve, delays[retries - 1]));
                }
            }
        }

        // 全局变量保存当前报告文本，用于语音播报和 QA 上下文
        let currentReportText = "";

        // PCM 转 WAV 辅助函数 (TTS 所需)
        function pcmToWav(pcmData, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.length;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            for (let i = 0; i < pcmData.length; i++) {
                view.setUint8(44 + i, pcmData[i]);
            }
            return buffer;
        }

        // 语音播报功能 (TTS API)
        async function playTTS() {
            if (!currentReportText) {
                showToast("没有可播报的内容！");
                return;
            }
            const ttsBtn = document.getElementById('ttsBtn');
            ttsBtn.innerHTML = '<i class="ph ph-spinner-gap animate-spin"></i> 生成语音中...';
            ttsBtn.disabled = true;

            try {
                // 提取摘要进行播报 (前500字)，避免生成音频过长
                const textToRead = currentReportText.replace(/[#*]/g, '').substring(0, 500) + (currentReportText.length > 500 ? "......播报完毕，详细内容请阅读屏幕全文。" : "");
                
                const payload = {
                    contents: [{ parts: [{ text: "为您播报农情诊断摘要：" + textToRead }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
                    },
                    model: "gemini-2.5-flash-preview-tts"
                };

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const inlineData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                if (inlineData && inlineData.data) {
                    const base64Data = inlineData.data;
                    const binaryString = window.atob(base64Data);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    
                    let sampleRate = 24000;
                    if (inlineData.mimeType && inlineData.mimeType.includes("rate=")) {
                        const match = inlineData.mimeType.match(/rate=(\d+)/);
                        if (match) sampleRate = parseInt(match[1]);
                    }

                    const wavBuffer = pcmToWav(bytes, sampleRate);
                    const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(blob);
                    
                    const audio = new Audio(audioUrl);
                    audio.play();
                    showToast("正在播报报告摘要...");
                }
            } catch (error) {
                console.error("TTS Error:", error);
                showToast("语音生成失败，请稍后重试。");
            } finally {
                ttsBtn.innerHTML = '<i class="ph ph-speaker-high"></i> ✨ 语音播报';
                ttsBtn.disabled = false;
            }
        }

        // 文件转 Base64 辅助函数
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    let encoded = reader.result.toString().replace(/^data:(.*,)?/, '');
                    if ((encoded.length % 4) > 0) {
                        encoded += '='.repeat(4 - (encoded.length % 4));
                    }
                    resolve(encoded);
                };
                reader.onerror = error => reject(error);
            });
        }

        // 病害图片智能识别 (Image Understanding API)
        async function analyzeImage() {
            const fileInput = document.getElementById('imageInput');
            const location = document.getElementById('locationInput').value.trim() || '未知地区';
            const crop = document.getElementById('cropInput').value.trim() || '当前作物';

            if (!fileInput.files || fileInput.files.length === 0) {
                showToast("请先选择一张病害叶片或植株的照片！");
                return;
            }

            const file = fileInput.files[0];
            const base64Data = await fileToBase64(file);
            
            // UI 状态切换
            document.getElementById('initialState').classList.add('hidden');
            document.getElementById('errorState').classList.add('hidden');
            document.getElementById('resultState').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('loadingText').innerText = "✨ 正在启动 AI 视觉引擎分析病理特征...";

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const prompt = `你是一个资深农业专家。我上传了一张可能是【${crop}】的病害或受损部位图片。目前所在地区是【${location}】。
                请结合图片视觉特征，完成以下任务：
                1. 识别图片中的作物及具体的病害/虫害/缺素症状名称。
                2. 分析病害严重程度。
                3. 结合当地可能的气候给出针对性的化学或物理防治建议。
                使用易于阅读的 Markdown 格式输出。`;

                const payload = {
                    contents: [{
                        role: "user",
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: file.type || "image/jpeg", data: base64Data } }
                        ]
                    }]
                };

                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!responseText) throw new Error("视觉分析未能返回结果。");

                // 保存到全局变量供 QA 和 TTS 使用
                currentReportText = responseText;
                document.getElementById('markdownContent').innerHTML = 
                    `<div class="mb-6 text-blue-700 bg-blue-50 p-4 rounded-lg font-bold border border-blue-200 flex items-center gap-2"><i class="ph ph-scan text-2xl"></i> AI 视觉病理诊断结果</div>` + 
                    marked.parse(responseText);
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('resultState').classList.remove('hidden');
                document.getElementById('qaSection').classList.remove('hidden');

            } catch (error) {
                console.error("Image Analysis Error:", error);
                document.getElementById('errorMsg').innerText = "视觉分析错误: " + error.message;
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('errorState').classList.remove('hidden');
            }
        }

        // 进一步咨询专家 (Text Generation API)
        async function askQuestion() {
            const qaInput = document.getElementById('qaInput');
            const question = qaInput.value.trim();
            if (!question) return;

            const qaResult = document.getElementById('qaResult');
            qaResult.classList.remove('hidden');
            qaResult.innerHTML = '<div class="flex items-center text-green-600 gap-2"><i class="ph ph-spinner-gap animate-spin"></i> 专家正在为您解答...</div>';
            
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const prompt = `以下是我们刚才的报告上下文：
                ${currentReportText}
                
                用户针对此报告或当前情况提出了一个新问题："${question}"
                请作为农业气象与病理学专家，用专业、通俗易懂且简明扼要的语气回答用户的问题。`;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }]
                };

                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                qaResult.innerHTML = marked.parse(responseText || "抱歉，未能获取到回答。");
                qaInput.value = ""; 

            } catch (error) {
                qaResult.innerHTML = `<span class='text-red-500 flex items-center gap-2'><i class="ph ph-warning-circle"></i> 回答失败：${error.message}</span>`;
            }
        }

        async function startAnalysis() {
            // 获取输入值，对于未填写的字段赋予默认值，不再强制要求全部填写
            const location = document.getElementById('locationInput').value.trim() || '未指定地区';
            const crop = document.getElementById('cropInput').value.trim() || '未指定作物';
            const stage = document.getElementById('stageInput').value.trim() || '未指定生育期';
            const operation = document.getElementById('operationInput').value.trim() || '未指定拟定操作';

            // 切换 UI 状态
            document.getElementById('initialState').classList.add('hidden');
            document.getElementById('errorState').classList.add('hidden');
            document.getElementById('resultState').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('generateBtn').classList.add('opacity-75', 'cursor-not-allowed');

            try {
                // 1. 构建复杂的专家提示词（System Prompt & User Query）
                const systemPrompt = `你是一个融合了顶级农业气象学、植物生理学、植物病理学、病原微生物学以及农学栽培专家的 AI 系统。你的任务是根据用户提供的地点、作物、当前生育期以及拟进行的操作，结合你获取到的该地点未来7天的天气预报数据，给出一份极具权威性、可操作性的报告。
                
结构必须包含以下部分（使用 Markdown 格式）：
1. ☁️ 近期核心气象诊断 (简述检索到的该地点近期关键天气变化趋势，如温度波动、降水、风速等)
2. 🌿 植物生理影响评估 (结合生育期，分析当前气象条件对作物光合作用、蒸腾作用、养分吸收或器官发育的具体生理影响)
3. 🦠 病虫害发生风险预警 (结合温湿度气象条件，应用植物病理学和微生物学原理，预测哪些特定病害（如孢子萌发、菌丝生长条件）或虫害容易爆发)
4. 🚜 拟定农事操作可行性分析及改进建议 (针对用户计划的农事操作，评估是否合适，并结合气象给出具体的防范措施或时间调整建议)
请保持专业、严谨，并给出具有极高实践指导价值的建议。`;

                const userQuery = `
地点：${location}
作物品种：${crop}
当前生育期：${stage}
拟进行的农事操作：${operation}

请先使用搜索工具查询“${location} 未来一周天气预报”，然后基于真实的气象预测数据，根据上述专家要求生成完整的诊断报告。`;

                // 2. 准备调用 Gemini API (带 Google Search grounding)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const payload = {
                    contents: [{
                        parts: [{ text: userQuery }]
                    }],
                    systemInstruction: {
                        parts: [{ text: systemPrompt }]
                    },
                    tools: [{
                        google_search: {} // 启用联网搜索以获取当地天气
                    }]
                };

                // 3. 发送请求
                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // 4. 解析结果
                const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!responseText) {
                    throw new Error("模型未返回有效文本，可能由于安全拦截或网络问题。");
                }

                // 保存到全局变量供 TTS 和 QA 模块使用
                currentReportText = responseText;

                // 5. 渲染 Markdown
                document.getElementById('markdownContent').innerHTML = marked.parse(responseText);

                // 切换到结果界面
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('resultState').classList.remove('hidden');
                document.getElementById('qaSection').classList.remove('hidden'); // 显示问答区域

            } catch (error) {
                console.error("生成报错:", error);
                document.getElementById('errorMsg').innerText = "发生错误: " + error.message;
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('errorState').classList.remove('hidden');
            } finally {
                // 恢复按钮状态
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('generateBtn').classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        // 复制报告功能
        function copyReport() {
            const textToCopy = document.getElementById('markdownContent').innerText;
            // 由于 iframe 限制，使用传统复制方法
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast("报告已复制到剪贴板！");
            } catch (err) {
                showToast("复制失败，请手动选取复制。");
            }
            document.body.removeChild(textarea);
        }

        // 提示框逻辑
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
        
        // 预设一些示例方便测试
        window.onload = () => {
            document.getElementById('locationInput').value = "山东省济南市";
            document.getElementById('cropInput').value = "冬小麦";
            document.getElementById('stageInput').value = "拔节期";
            document.getElementById('operationInput').value = "计划喷施除草剂并进行浇水追肥";
        };
    </script>
</body>
</html>
